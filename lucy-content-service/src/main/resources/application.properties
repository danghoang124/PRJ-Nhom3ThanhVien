# =====================================================
#   LUCY Content Service - Cấu hình kết nối MySQL
# =====================================================

# --- MySQL DataSource ---
spring.datasource.url=jdbc:mysql://localhost:3306/lucy_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=8085
server.servlet.context-path=/

# --- Swagger UI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- File Upload (cho POST /api/import/word) ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- Logging ---
logging.level.com.lucy=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- JWT (shared secret with .NET Auth Service) ---
jwt.secret=${JWT_SECRET:LUCY_SuperSecretKey_2024_MustBe32CharsLong!}
